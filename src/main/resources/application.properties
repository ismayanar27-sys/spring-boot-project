spring.application.name=myapp

# ==============================================================
# 1. DATABASE CONFIGURATION
# ==============================================================
# Data is read from Environment Variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL dialect is handled automatically by Hibernate

# ==============================================================
# 2. JPA & HIBERNATE
# ==============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
java.security.egd=file:/dev/./urandom

# ==============================================================
# 3. FILE UPLOAD (Cloudinary)
# ==============================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================================================
# 4. EMAIL SERVICE (Brevo HTTP API)
# ==============================================================
# QEYD: Gmail SMTP-den Brevo-ya kecirildi, cunki Render hosting
# provayderleri pulsuz planda SMTP portlarina (587) cixisi bloklayir.
brevo.api-key=${BREVO_API_KEY}
brevo.sender-email=${ADMIN_EMAIL}
brevo.sender-name=Yummy Restaurant

admin.email.recipient=${ADMIN_EMAIL}

# ==============================================================
# 5. ADMIN LOGIN (Security)
# ==============================================================
# QEYD: Admin istifadecisi SecurityConfig.java-da InMemoryUserDetailsManager
# vasitesile custom bean kimi teyin olunub

# ==============================================================
# 6. PAYMENT (Portmanat)
# ==============================================================
portmanat.merchant-id=${PORTMANAT_MERCHANT_ID:}
portmanat.secret-key=${PORTMANAT_SECRET_KEY:}