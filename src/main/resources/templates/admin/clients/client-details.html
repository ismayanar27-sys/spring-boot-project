<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Müştəri Detalları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <h1 class="mb-4">Müştəri Detalları</h1>

        <ul class="list-group list-group-flush">
            <li class="list-group-item"><strong>ID:</strong> <span th:text="${client.id}"></span></li>
            <li class="list-group-item"><strong>Ad:</strong> <span th:text="${client.name}"></span></li>
            <li class="list-group-item"><strong>Email:</strong> <span th:text="${client.email}"></span></li>
            <li class="list-group-item"><strong>Təsvir:</strong> <span th:text="${client.description}"></span></li>
            <li class="list-group-item"><strong>Əlavə məlumat:</strong> <span th:text="${client.information}"></span></li>
        </ul>

        <div class="mt-4">
            <a th:href="@{/admin/clients/edit/{id}(id=${client.id})}" class="btn btn-primary">Redaktə et</a>
            <a th:href="@{/admin/clients}" class="btn btn-secondary">Siyahıya qayıt</a>
        </div>
    </div>
</div>
</body>
</html>
