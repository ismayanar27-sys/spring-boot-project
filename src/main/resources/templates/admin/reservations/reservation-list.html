<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation Management</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Səhifə başlığı -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Reservation Management</h2>

        <a th:href="@{/admin}"
           class="btn btn-secondary">
            ← Admin Panel
        </a>
    </div>

    <!-- Reservation siyahısı -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>People</th>
                        <th>Status</th>
                        <th width="270">Actions</th>
                    </tr>

                    </thead>

                    <tbody>

                    <!-- Controller-dən gələn rezervasiyalar -->
                    <tr th:each="res : ${reservations}">

                        <td th:text="${res.id}"></td>

                        <td th:text="${res.name}"></td>

                        <td th:text="${res.phone}"></td>

                        <td th:text="${res.email}"></td>

                        <td th:text="${res.reservationDate}"></td>

                        <td th:text="${res.reservationTime}"></td>

                        <td th:text="${res.people}"></td>

                        <td>

                            <span th:if="${res.status.name()=='PENDING'}"
                                  class="badge bg-warning text-dark">
                                Pending
                            </span>

                            <span th:if="${res.status.name()=='CONFIRMED'}"
                                  class="badge bg-success">
                                Confirmed
                            </span>

                            <span th:if="${res.status.name()=='COMPLETED'}"
                                  class="badge bg-primary">
                                Completed
                            </span>

                            <span th:if="${res.status.name()=='CANCELLED'}"
                                  class="badge bg-danger">
                                Cancelled
                            </span>

                        </td>

                        <td>

                            <div class="d-flex gap-2">

                                <!-- Detallara bax -->
                                <a th:href="@{/admin/reservations/{id}(id=${res.id})}"
                                   class="btn btn-info btn-sm">
                                    Details
                                </a>

                                <!-- DÜZƏLDİLDİ: forma "/admin/reservations/update-status" ünvanına
                                     göndərirdi, amma controller-də belə bir mapping yoxdur - real
                                     endpoint "/admin/reservations/{id}/status"-dur (path variable).
                                     SİLİNDİ: th:action="@{/admin/reservations/update-status}" + hidden "id" input -->
                                <form th:action="@{/admin/reservations/{id}/status(id=${res.id})}"
                                      method="post"
                                      class="d-flex gap-1">

                                    <!-- ƏLAVƏ EDİLDİ: CSRF token. Bu layihədə
                                         thymeleaf-extras-springsecurity6 asılılığı yoxdur, ona görə
                                         token avtomatik yeridilmir - əl ilə yazılmalıdır, yoxsa
                                         Spring Security bu POST sorğusunu 403 Forbidden ilə rədd edər. -->
                                    <input type="hidden"
                                           th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}"/>

                                    <select name="status"
                                            class="form-select form-select-sm">

                                        <option th:each="st : ${statuses}"
                                                th:value="${st}"
                                                th:text="${st}"
                                                th:selected="${st==res.status}">
                                        </option>

                                    </select>

                                    <button type="submit"
                                            class="btn btn-primary btn-sm">
                                        Save
                                    </button>

                                </form>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
