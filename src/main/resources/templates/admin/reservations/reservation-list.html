<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation Admin Panel</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Rezervasiyaların İdarə Edilməsi Panel</h2>
        <a href="/admin" class="btn btn-secondary">Admin Panelə Qayıt</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ad</th>
                        <th>Telefon</th>
                        <th>Email</th>
                        <th>Tarix</th>
                        <th>Saat</th>
                        <th>Nəfər</th>
                        <th>Mesaj</th>
                        <th>Status</th>
                        <th>Əməliyyat</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Controller-dən gələn rezervasiyaları dövrə salırıq -->
                    <tr th:each="res : ${reservations}">
                        <td th:text="${res.id}">1</td>
                        <td th:text="${res.name}">Ad</td>
                        <td th:text="${res.phone}">Telefon</td>
                        <td th:text="${res.email}">Email</td>
                        <td th:text="${res.reservationDate}">2026-07-20</td>
                        <td th:text="${res.reservationTime}">23:00</td>
                        <td th:text="${res.people}">2</td>
                        <td th:text="${res.message}">Mesaj</td>
                        <td>
                            <!-- Statusa uyğun rəngli badge göstərilməsi -->
                            <span th:if="${res.status.name() == 'PENDING'}" class="badge bg-warning text-dark">PENDING</span>
                            <span th:if="${res.status.name() == 'CONFIRMED'}" class="badge bg-success">CONFIRMED</span>
                            <span th:if="${res.status.name() == 'CANCELLED'}" class="badge bg-danger">CANCELLED</span>
                        </td>
                        <td>
                            <!-- Statusu dəyişmək üçün form -->
                            <form th:action="@{/admin/reservations/update-status}" method="post" class="d-flex gap-1">
                                <input type="hidden" name="id" th:value="${res.id}"/>
                                <select name="status" class="form-select form-select-sm" style="width: 130px;">
                                    <!-- Controller-dən gələn bütün status siyahısını dropdown-a doldururuq -->
                                    <option th:each="st : ${statuses}"
                                            th:value="${st}"
                                            th:text="${st}"
                                            th:selected="${st == res.status}"></option>
                                </select>
                                <button type="submit" class="btn btn-primary btn-sm">Yenilə</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
