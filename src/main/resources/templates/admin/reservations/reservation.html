<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Reservation Details</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header d-flex justify-content-between align-items-center">
      <h3>Reservation Details</h3>

      <a th:href="@{/admin/reservations}"
         class="btn btn-secondary">
        ← Back
      </a>
    </div>

    <div class="card-body">

      <table class="table table-bordered">

        <tr>
          <th style="width:250px;">Reservation ID</th>
          <td th:text="${reservation.id}"></td>
        </tr>

        <tr>
          <th>Customer Name</th>
          <td th:text="${reservation.name}"></td>
        </tr>

        <tr>
          <th>Email</th>
          <td th:text="${reservation.email}"></td>
        </tr>

        <tr>
          <th>Phone</th>
          <td th:text="${reservation.phone}"></td>
        </tr>

        <tr>
          <th>Reservation Date</th>
          <td th:text="${reservation.reservationDate}"></td>
        </tr>

        <tr>
          <th>Reservation Time</th>
          <td th:text="${reservation.reservationTime}"></td>
        </tr>

        <tr>
          <th>People</th>
          <td th:text="${reservation.people}"></td>
        </tr>

        <tr>
          <th>Status</th>
          <td>
                        <span class="badge bg-warning"
                              th:if="${reservation.status.name()=='PENDING'}">
                            PENDING
                        </span>

            <span class="badge bg-success"
                  th:if="${reservation.status.name()=='CONFIRMED'}">
                            CONFIRMED
                        </span>

            <span class="badge bg-danger"
                  th:if="${reservation.status.name()=='CANCELLED'}">
                            CANCELLED
                        </span>

            <span class="badge bg-primary"
                  th:if="${reservation.status.name()=='COMPLETED'}">
                            COMPLETED
                        </span>
          </td>
        </tr>

        <tr>
          <th>Created At</th>
          <td th:text="${reservation.createdAt}"></td>
        </tr>

        <tr>
          <th>Customer Message</th>
          <td th:text="${reservation.message}"></td>
        </tr>

      </table>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
