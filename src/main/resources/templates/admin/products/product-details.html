<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Məhsul Detalları</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .card { border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product-photo { max-width: 250px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <h1 class="mb-4">Məhsul Detalları</h1>

        <div class="row">
            <div class="col-md-4">
                <img th:if="${product.photoUrl}" th:src="${product.photoUrl}" class="product-photo" alt="Məhsul şəkli"/>
            </div>
            <div class="col-md-8">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item"><strong>ID:</strong> <span th:text="${product.id}"></span></li>
                    <li class="list-group-item"><strong>Ad:</strong> <span th:text="${product.name}"></span></li>
                    <li class="list-group-item"><strong>Təsvir:</strong> <span th:text="${product.description}"></span></li>
                    <li class="list-group-item"><strong>Qiymət:</strong> <span th:text="${product.price}"></span> AZN</li>
                    <li class="list-group-item"><strong>Brend:</strong> <span th:text="${product.brand}"></span></li>
                    <li class="list-group-item"><strong>Həcm:</strong> <span th:text="${product.volume}"></span> ml</li>
                    <li class="list-group-item"><strong>Qoxu/Tərkib:</strong> <span th:text="${product.scent}"></span></li>
                    <li class="list-group-item"><strong>Kateqoriya:</strong> <span th:text="${product.category}"></span></li>
                </ul>
            </div>
        </div>

        <div class="mt-4">
            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-primary">Redaktə et</a>
            <a th:href="@{/admin/products}" class="btn btn-secondary">Siyahıya qayıt</a>
        </div>
    </div>
</div>
</body>
</html>
