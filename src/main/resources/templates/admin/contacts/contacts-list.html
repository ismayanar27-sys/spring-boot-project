<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Səhifə başlığı -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Contact Messages</h2>

        <a th:href="@{/admin}"
           class="btn btn-secondary">
            ← Admin Panel
        </a>
    </div>

    <!-- Uğur/xəta bildirişləri (redirect ilə flash attribute-dan gəlir) -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Mesajlar siyahısı -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div th:if="${#lists.isEmpty(messages)}" class="text-muted text-center py-4">
                Hələ heç bir əlaqə mesajı yoxdur.
            </div>

            <div class="table-responsive" th:unless="${#lists.isEmpty(messages)}">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ad</th>
                        <th>Email</th>
                        <th>Mövzu</th>
                        <th>Mesaj</th>
                        <th>Tarix</th>
                        <th width="120">Əməliyyat</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="msg : ${messages}">

                        <td th:text="${msg.id}"></td>

                        <td th:text="${msg.name}"></td>

                        <td>
                            <a th:href="'mailto:' + ${msg.email}" th:text="${msg.email}"></a>
                        </td>

                        <td th:text="${msg.subject}"></td>

                        <!-- Uzun mesajlar cədvəli sındırmasın deyə maksimum en verilir -->
                        <td style="max-width: 320px; white-space: pre-wrap;" th:text="${msg.message}"></td>

                        <td th:text="${msg.receivedAt}"></td>

                        <td>
                            <!-- CSRF token əl ilə əlavə olunur, çünki bu
                                 layihədə thymeleaf-extras-springsecurity6 asılılığı yoxdur
                                 (avtomatik token yeridilmir), ona görə hər POST formda
                                 "${_csrf}" model atributu vasitəsilə əl ilə yazılmalıdır -
                                 yoxsa Spring Security bu sorğunu 403 Forbidden ilə rədd edər. -->
                            <form th:action="@{/admin/contacts/delete/{id}(id=${msg.id})}"
                                  method="post"
                                  onsubmit="return confirm('Bu mesajı silmək istədiyinizə əminsiniz?');">

                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>

                                <button type="submit" class="btn btn-danger btn-sm">
                                    Sil
                                </button>
                            </form>
                        </td>

                    </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
